name: LoverOrder
options:
  bundleIdPrefix: com.loverorder
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  LoverOrder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LoverOrder
    resources:
      - path: LoverOrder/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loverorder.app
        INFOPLIST_FILE: LoverOrder/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: LoverOrder/Resources/LoverOrder.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: LoverOrder/Resources/Info.plist
      properties:
        CFBundleDisplayName: 我们这顿
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AppBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
