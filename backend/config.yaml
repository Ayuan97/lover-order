# lover-order 后端配置

server:
  port: 8081
  mode: debug

database:
  host: 127.0.0.1
  port: 3306
  username: root
  password: root
  database: lover_order
  charset: utf8mb4
  parse_time: true
  loc: Local
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

jwt:
  secret: lover-order-jwt-secret-please-change-in-production
  expire_hours: 168
  refresh_expire_hours: 720

apple:
  team_id: ""
  client_id: ""
  key_id: ""
  private_key_path: ""
  jwks_url: https://appleid.apple.com/auth/keys
  issuer: https://appleid.apple.com

upload:
  path: ./uploads
  max_size: 10485760
  allowed_types:
    - jpg
    - jpeg
    - png
    - webp
    - heic

log:
  level: info
  file: ./logs/app.log
  max_size: 100
  max_backups: 3
  max_age: 28

cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
  allow_headers:
    - Origin
    - Content-Type
    - Authorization
